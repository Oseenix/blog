baseURL = "https://blog.fdsboard.com/"

# Theme
theme = "LoveIt"

# Site title
title = "fds-board"

# Default content language
defaultContentLanguage = "en"
languageCode = "en"
languageName = "English"

# Whether to include Chinese/Japanese/Korean
hasCJKLanguage = true

# Whether to use robots.txt
enableRobotsTXT = true
# Whether to use git commit log
enableGitInfo = false
# Whether to use emoji code
enableEmoji = true

# Ignore some build errors
ignoreErrors = ["error-remote-getjson", "error-missing-instagram-accesstoken"]

# Pagination config
[pagination]
  pagerSize = 10

# Menu config
[menu]
  [[menu.main]]
    weight = 1
    identifier = "tags"
    pre = ""
    post = ""
    name = "Tags"
    url = "/tags/"
    title = ""
  [[menu.main]]
    weight = 2
    identifier = "categories"
    pre = ""
    post = ""
    name = "Categories"
    url = "/categories/"
    title = ""
  [[menu.main]]
    weight = 3
    identifier = "about"
    pre = ""
    post = ""
    name = "About"
    url = "/about/"
    title = ""

[params]
  # Site default theme ["auto", "light", "dark"]
  defaultTheme = "auto"
  # Public git repo url
  gitRepo = "https://github.com/Oseenix/oseenix.github.io"
  # Date format
  dateFormat = "2006-01-02"
  # Website title for Open Graph and Twitter Cards
  title = "fds-board"
  # Website description for RSS, SEO, Open Graph and Twitter Cards
  description = "Discovery, Insight, and Bliss"
  # Website images for Open Graph and Twitter Cards
  images = ["/imgs/avatar.jpeg"]

  # Which sections to display on home page
  mainSections = ["rmd", "net", "devops"]

  # Author config
  [params.author]
    name = "Jinze(Jerry) Zhou"
    email = ""
    link = "https://github.com/Oseenix"

  # Header config
  [params.header]
    desktopMode = "fixed"
    mobileMode = "auto"
    [params.header.title]
      logo = ""
      name = "fds-board"
      pre = ""
      post = ""
      typeit = false

  # Footer config
  [params.footer]
    enable = true
    custom = ""
    hugo = true
    copyright = true
    author = true
    since = 2020
    icp = ""
    license = '<a rel="license external nofollow noopener noreffer" href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a>'

  # Section (all posts) page config
  [params.section]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  # List (category or tag) page config
  [params.list]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  # App icon config
  [params.app]
    title = "fds-board"
    noFavicon = false
    svgFavicon = ""
    themeColor = "#ffffff"
    iconColor = "#5bbad5"
    tileColor = "#da532c"

  # Search config
  [params.search]
    enable = true
    # Use lunr for client-side search (no external service needed)
    type = "lunr"
    contentLength = 4000
    placeholder = ""
    maxResultLength = 10
    snippetLength = 30
    highlightTag = "em"
    absoluteURL = false

  # Home page config
  [params.home]
    rss = 10
    [params.home.profile]
      enable = true
      gravatarEmail = ""
      avatarURL = "/imgs/avatar.jpeg"
      title = ""
      subtitle = "Discovery, Insight, and Bliss"
      typeit = false
      social = true
      disclaimer = ""
    [params.home.posts]
      enable = true
      paginate = 6

  # Social config in home page
  [params.social]
    GitHub = "Oseenix"
    RSS = true

  # Page global config
  [params.page]
    hiddenFromHomePage = false
    hiddenFromSearch = false
    twemoji = false
    lightgallery = false
    ruby = true
    fraction = true
    fontawesome = true
    linkToMarkdown = false
    rssFullText = false

    # Table of contents config
    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true

    # Code config
    [params.page.code]
      copy = true
      maxShownLines = 50

    # KaTeX mathematical formulas
    [params.page.math]
      enable = true
      inlineLeftDelimiter = ""
      inlineRightDelimiter = ""
      blockLeftDelimiter = ""
      blockRightDelimiter = ""
      copyTex = true
      mhchem = true

    # Social share links in post page
    [params.page.share]
      enable = false

    # Comment config
    [params.page.comment]
      enable = true
      [params.page.comment.giscus]
        enable = true
        repo = "Oseenix/blog"
        repoId = "R_kgDOJ1cdKQ"
        category = "Announcements"
        categoryId = "DIC_kwDOJ1cdKc4CXkae"
        lang = ""
        mapping = "pathname"
        strict = "0"
        reactionsEnabled = "1"
        emitMetadata = "0"
        inputPosition = "bottom"
        lazyLoading = true
        lightTheme = "light"
        darkTheme = "dark"

    # Page SEO config
    [params.page.seo]
      images = []
      [params.page.seo.publisher]
        name = "Jinze(Jerry) Zhou"
        logoUrl = "/imgs/avatar.jpeg"

  # TypeIt config
  [params.typeit]
    speed = 100
    cursorSpeed = 1000
    cursorChar = "|"
    duration = -1

  # CDN config for third-party library files
  [params.cdn]
    data = "jsdelivr.yml"

  # Compatibility config
  [params.compatibility]
    polyfill = false
    objectFit = false

# Markup related configuration
[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
  [markup.goldmark]
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 6

# Sitemap config
[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

# Privacy config
[privacy]
  [privacy.googleAnalytics]
  [privacy.twitter]
  [privacy.youtube]

# Options to make output .md files
[mediaTypes]
  [mediaTypes."text/plain"]
    suffixes = ["md"]

[outputFormats.MarkDown]
  mediaType = "text/plain"
  isPlainText = true
  isHTML = false

# Options to make hugo output files
[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML", "MarkDown"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]

# Multilingual
[languages]
  [languages.en]
    weight = 1
    languageCode = "en"
    languageName = "English"
    hasCJKLanguage = true
    [languages.en.menu]
      [[languages.en.menu.main]]
        weight = 1
        identifier = "tags"
        name = "Tags"
        url = "/tags/"
      [[languages.en.menu.main]]
        weight = 2
        identifier = "categories"
        name = "Categories"
        url = "/categories/"
      [[languages.en.menu.main]]
        weight = 3
        identifier = "about"
        name = "About"
        url = "/about/"

  [languages.zh-cn]
    weight = 2
    languageCode = "zh-CN"
    languageName = "简体中文"
    hasCJKLanguage = true
    [languages.zh-cn.menu]
      [[languages.zh-cn.menu.main]]
        weight = 1
        identifier = "tags"
        name = "标签"
        url = "/tags/"
      [[languages.zh-cn.menu.main]]
        weight = 2
        identifier = "categories"
        name = "分类"
        url = "/categories/"
      [[languages.zh-cn.menu.main]]
        weight = 3
        identifier = "about"
        name = "关于"
        url = "/about/"
